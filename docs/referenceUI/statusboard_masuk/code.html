<body class="min-h-screen flex items-center justify-center p-margin-mobile md:p-gutter text-on-surface">

<!-- Brand Header -->

<h1 class="text-headline-md font-headline-md text-primary">StatusBoard</h1>
</div>
<!-- Login Card -->
<div class="card-level-1 rounded-lg p-stack-lg shadow-lg">
<form action="#" class="space-y-stack-md" method="POST">
<!-- Username / Email Field -->
<div>
<label class="block text-label-caps font-label-caps text-on-surface-variant mb-stack-sm" for="identifier">
                        Username atau Email
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute inset-y-0 left-0 flex items-center pl-3 text-on-surface-variant pointer-events-none" data-icon="person">person</span>
<input class="input-inset block w-full pl-10 pr-3 py-2 text-body-md font-body-md text-on-surface rounded-DEFAULT bg-surface-container-high text-on-surface-variant" id="identifier" name="identifier" placeholder="Masukkan username atau email" required="" type="text">
</div>
</div>
<!-- Password Field -->
<div>
<label class="block text-label-caps font-label-caps text-on-surface-variant mb-stack-sm" for="password">
                        Kata Sandi
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute inset-y-0 left-0 flex items-center pl-3 text-on-surface-variant pointer-events-none" data-icon="lock">lock</span>
<input class="input-inset block w-full pl-10 pr-3 py-2 text-body-md font-body-md text-on-surface rounded-DEFAULT bg-surface-container-high text-on-surface-variant" id="password" name="password" placeholder="••••••••" required="" type="password">
</div>
</div>
<!-- Submit Button -->
<div class="pt-stack-sm">
<button class="btn-primary w-full py-2 px-4 text-body-md font-body-md font-semibold hover:opacity-90 transition-opacity flex justify-center items-center gap-2" type="submit">
                        Masuk
                        <span class="material-symbols-outlined text-sm" data-icon="login">login</span>
</button>
</div>
